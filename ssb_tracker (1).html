function load(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

let STATE={
  view:"today",
  viewingDay:1,
  currentDay:1,
  taskData: load("ssb_tasks")||{},
  ngoMode:  load("ssb_ngo")||{},
  journal:  load("ssb_journal")||{},
  expandedTask:null,
  journalText:"",
  notifGranted: ("Notification" in window && Notification.permission==="granted"),
  notifScheduled: load("ssb_notif_scheduled")||false,
};

function getDayNumber(){
  const diff=Math.floor((new Date()-START_DATE)/86400000)+1;
  return Math.max(1,Math.min(36,diff));
}

function getDateLabel(day){
  const d=new Date(START_DATE);
  d.setDate(d.getDate()+day-1);
  return d.toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"});
}

function resolveTask(task,isOffice,dayIdx){
  if(task.tag!=="__NGO__") return task;
  const i=Math.min(dayIdx,14);
  return{...task,task:isOffice?NGO_OFFICE[i]:NGO_REMOTE[i],tag:isOffice?"ngo_office":"ngo_remote"};
}

function getResolvedTasks(day){
  const plan=PLAN.find(p=>p.day===day);
  if(!plan) return[];
  const mode=STATE.ngoMode[`d${day}`];
  return plan.tasks.map(t=>resolveTask(t,mode==="office",day-1));
}

function getDayStats(day){
  const tasks=getResolvedTasks(day);
  const done=tasks.filter(t=>STATE.taskData[t.id]?.done).length;
  const ratings=tasks.map(t=>STATE.taskData[t.id]?.rating).filter(Boolean);
  const avgRating=ratings.length?(ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(1):0;
  const totalTime=tasks.reduce((acc,t)=>acc+(STATE.taskData[t.id]?.time||0),0);
  return{done,total:tasks.length,avgRating,totalTime};
}

function getOverall(){
  let done=0,total=0;
  for(let d=1;d<=36;d++){const s=getDayStats(d);done+=s.done;total+=s.total;}
  return{done,total,pct:total?Math.round(done/total*100):0};
}

function getStreak(){
  let streak=0;
  for(let d=STATE.currentDay;d>=1;d--){
    if(getDayStats(d).done>0) streak++; else break;
  }
  return streak;
}

async function requestNotifications(){
  if(!("Notification" in window))return;
  const p=await Notification.requestPermission();
  STATE.notifGranted=p==="granted";
  if(p==="granted"){
    showToast("🔔 Notifications enabled!");
    new Notification("SSB Mission Active 🔥",{body:"Saurabh — July 21 is the target. Day 1 starts now."});
    scheduleAllNotifications();
  }
  render();
}

function scheduleAllNotifications(){
  // We use a Service Worker approach via scheduled checks
  // Store all scheduled times in localStorage for the SW
  const schedule=[];
  for(let d=1;d<=36;d++){
    const plan=PLAN.find(p=>p.day===d);
    if(!plan) continue;
    const date=new Date(START_DATE);
    date.setDate(date.getDate()+d-1);
    const ph=plan.phase;
    const notifs=ph===1?NOTIF_SCHEDULE.phase1:ph===2?NOTIF_SCHEDULE.phase2:NOTIF_SCHEDULE.phase3;
    notifs.forEach(([h,m,title,body])=>{
      const t=new Date(date);
      t.setHours(h,m,0,0);
      if(t>new Date()){
        schedule.push({ts:t.getTime(),title:`[Day ${d}] ${title}`,body,day:d});
      }
    });
  }
  save("ssb_notif_schedule",schedule);
  save("ssb_notif_scheduled",true);
  STATE.notifScheduled=true;
  startNotifChecker();
  showToast(`✅ ${schedule.length} reminders scheduled for all 36 days!`);
}

let notifCheckInterval=null;
function startNotifChecker(){
  if(notifCheckInterval) clearInterval(notifCheckInterval);
  notifCheckInterval=setInterval(()=>{
    if(!STATE.notifGranted) return;
    const schedule=load("ssb_notif_schedule")||[];
    const now=Date.now();
    const fired=load("ssb_notif_fired")||{};
    let changed=false;
    schedule.forEach(n=>{
      const key=`${n.ts}`;
      if(!fired[key] && now>=n.ts && now<=n.ts+60000){
        fired[key]=true;
        changed=true;
        new Notification(n.title,{
          body:n.body,
          icon:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23f7a030'/%3E%3Ctext y='.9em' font-size='90' x='10'%3E⭐%3C/text%3E%3C/svg%3E",
          badge:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23f7a030'/%3E%3C/svg%3E",
          tag:`ssb-${n.ts}`,
          requireInteraction:false,
        });
      }
    });
    if(changed) save("ssb_notif_fired",fired);
  },30000); // check every 30 seconds
}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.style.display="block";
  t.style.opacity="1";
  clearTimeout(window._toastTimer);
  window._toastTimer=setTimeout(()=>{t.style.opacity="0";setTimeout(()=>t.style.display="none",300);},3000);
}

function phaseAccent(ph){return PHASE_META[ph]?.accent||"#f7a030";}
function phaseDim(ph){return PHASE_META[ph]?.dim||"#5a3a10";}

function tagStyle(tag){
  const c=TAG_COLORS[tag]||TAG_COLORS.rest;
  return `background:${c.bg};border:1px solid ${c.border};color:${c.text};`;
}

function el(tag,attrs,...children){
  const e=document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style") e.style.cssText=v;
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="class") e.className=v;
    else e.setAttribute(k,v);
  });
  children.flat().forEach(c=>{
    if(c===null||c===undefined) return;
    e.appendChild(typeof c==="string"?document.createTextNode(c):c);
  });
  return e;
}

function div(style,...children){return el("div",{style},...children);}
function span(style,text){const s=el("span",{style});s.textContent=text;return s;}
function btn(style,text,onClick){const b=el("button",{style,onClick});b.textContent=text;return b;}

      save("ssb_notif_fired",{});save("ssb_notif_schedule",[]);save("ssb_notif_scheduled",false);
      STATE.notifScheduled=false;render();showToast("Notifications reset.");
    });
    nb.appendChild(resetBtn); header.appendChild(nb);
  }
  app.appendChild(header);

  // ── CONTENT ──
  const content=div("padding:14px;");

  if(STATE.view==="today") renderToday(content,todayPlan,ph,accent,pm);
  else if(STATE.view==="plan") renderPlan(content,accent);
  else if(STATE.view==="stats") renderStats(content,ph,accent,overall,daysLeft,streak);
  else if(STATE.view==="journal") renderJournal(content,accent);

  app.appendChild(content);

  // ── NAV ──
  const nav=el("nav",{class:"nav"});
  [["today","⚡","Today"],["plan","🗓","Plan"],["stats","📊","Stats"],["journal","📓","Journal"]].forEach(([id,icon,label])=>{
    const b=el("button",{class:"nav-btn",style:`color:${STATE.view===id?accent:"#222"};border-top:2px solid ${STATE.view===id?accent:"transparent"};`,onClick:()=>{STATE.view=id;render();}});
    b.appendChild(span("font-size:16px;",icon));
    b.appendChild(span("",label));
    nav.appendChild(b);
  });
  app.appendChild(nav);

  // Start checker if notifications granted
  if(STATE.notifGranted && !notifCheckInterval) startNotifChecker();
}

    const hdr=div("display:flex;justify-content:space-between;margin-bottom:6px;");
    hdr.appendChild(span("font-size:9px;color:#2a2a2a;",date));
    hdr.appendChild(span(`font-size:9px;color:${accent};`,`Day ${entry.day}`));
    card.appendChild(hdr);
    const txt=el("div",{style:"font-size:12px;color:#555;line-height:1.6;"}); txt.textContent=entry.text; card.appendChild(txt);
    pastLabel.appendChild(card);
  });
  content.appendChild(pastLabel);
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
document.addEventListener("DOMContentLoaded",()=>{
  STATE.currentDay=getDayNumber();
  STATE.viewingDay=STATE.currentDay;
  if(STATE.notifGranted&&STATE.notifScheduled) startNotifChecker();
  render();
  // Re-render every minute to keep time fresh
  setInterval(()=>{
    STATE.currentDay=getDayNumber();
    render();
  },60000);
});
</script>
</body>
</html>
